# version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: bun prod:start
    networks:
      - ecommerce-dev
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - mailhog
      - minio
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-dev
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce-dev
    restart: unless-stopped
    volumes:
      - redis-data:/data





volumes:
  mongo-data:
  redis-data:


networks:
  ecommerce-dev:
    driver: bridge
